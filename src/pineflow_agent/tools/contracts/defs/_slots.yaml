# Shared slot type definitions — referenced by all tool YAMLs.
# Tools can override a slot by declaring it explicitly in their own properties block.

input_ref:
  type: string
  description: "Existing layer name or layer_id."
overlay_ref:
  type: string
  description: "Existing overlay layer name or layer_id."
input_refs:
  type: array
  description: "Existing layer names or layer_ids."
  items:
    type: string
distance:
  type: number
  description: "Distance value for buffer or spatial operation."
unit:
  type: string
  description: "Distance unit such as meter or kilometer."
target_crs:
  type: string
  description: "Target CRS string such as EPSG:3857."
field:
  type: string
  description: "Attribute field name."
fields:
  type: array
  description: "Attribute field names."
  items:
    type: string
field_name:
  type: string
  description: "New or updated field name."
operator:
  type: string
  description: "Attribute comparison operator."
value:
  description: "Attribute comparison value."
predicate:
  description: "Spatial predicate name or numeric QGIS predicate id."
intersect_ref:
  type: string
  description: "Layer used for spatial intersection predicates."
join_ref:
  type: string
  description: "Layer whose attributes are joined."
formula:
  type: string
  description: "QGIS expression formula."
x_field:
  type: string
  description: "CSV field containing x or longitude values."
y_field:
  type: string
  description: "CSV field containing y or latitude values."
crs:
  type: string
  description: "CRS for coordinates, such as EPSG:4326."
output_name:
  type: string
  description: "Short output layer alias."
output_path:
  type: string
  description: "Optional local output path."
output:
  type: string
  description: "Optional processing output destination."
segments:
  type: integer
  description: "Buffer segment count."
dissolve:
  type: boolean
  description: "Whether to dissolve buffer features."
dissolve_field:
  type: string
  description: "Optional field used for dissolve grouping."
method:
  type: integer
  description: "QGIS join method."
discard_nonmatching:
  type: boolean
  description: "Whether to discard unmatched input features."
join_fields:
  type: array
  items:
    type: string
  description: "Fields to copy from join layer."
prefix:
  type: string
  description: "Field prefix for joined attributes."
field_type:
  type: string
  description: "Field type for field calculator."
field_length:
  type: integer
  description: "Field length for field calculator."
field_precision:
  type: integer
  description: "Field precision for field calculator."
tolerance:
  type: number
  description: "Tolerance used by geometry simplification."
point_ref:
  type: string
  description: "Point vector layer name or layer_id."
polygon_ref:
  type: string
  description: "Polygon vector layer name or layer_id."
mask_ref:
  type: string
  description: "Polygon mask layer name or layer_id."
raster_ref:
  type: string
  description: "Raster layer name or layer_id."
raster_refs:
  type: array
  description: "Raster layer names or layer_ids used by a raster expression."
  items:
    type: string
extent:
  description: "Processing extent string or object, usually xmin,xmax,ymin,ymax [CRS]."
expression:
  type: string
  description: "QGIS expression, raster calculator formula, or filter expression."
band:
  type: integer
  description: "Raster band number."
raster_band:
  type: integer
  description: "Raster band number."
statistics:
  type: array
  description: "QGIS zonal statistics ids."
  items:
    type: integer
width:
  type: integer
  description: "Raster output width in pixels."
height:
  type: integer
  description: "Raster output height in pixels."
burn_value:
  type: number
  description: "Constant value burned into a rasterized vector."
column_prefix:
  type: string
  description: "Prefix used for generated attribute fields."
max_distance:
  type: number
  description: "Maximum nearest-neighbor search distance."
neighbors:
  type: integer
  description: "Number of nearest neighbors to join."
resampling:
  type: integer
  description: "GDAL/QGIS resampling method id."
crop_to_cutline:
  type: boolean
  description: "Whether to crop raster output to the mask cutline."
nodata:
  description: "Optional nodata value."
interval:
  type: number
  description: "Contour interval value."
table_ref:
  type: string
  description: "Reclassification table layer name or layer_id."
min_field:
  type: string
  description: "Field for minimum value in reclassification table."
max_field:
  type: string
  description: "Field for maximum value in reclassification table."
value_field:
  type: string
  description: "Field for output value in reclassification table."
z_factor:
  type: number
  description: "Vertical exaggeration factor for hillshade."
scale:
  type: number
  description: "Ratio of vertical to horizontal units for hillshade."
azimuth:
  type: number
  description: "Azimuth of the light source in degrees."
altitude:
  type: number
  description: "Altitude of the light source in degrees."
compute_edges:
  type: boolean
  description: "Whether to compute edges (avoid black border)."

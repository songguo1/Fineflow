name: roughness
description: "Calculate raster roughness from a DEM."
category: qgis_semantic
terminal: false

algorithm_id: gdal:roughness
required_slots: [input_ref]
defaults:
  band: 1
  compute_edges: false
  output: TEMPORARY_OUTPUT

processing_parameters:
  INPUT: input_ref
  BAND:
    slot: band
    default_slot: band
    type: int
  COMPUTE_EDGES:
    slot: compute_edges
    default_slot: compute_edges
    type: bool
  OUTPUT:
    value: __output__

display:
  title: "Calculate roughness"
  command: "roughness {input_ref}"

tags: [roughness, 地形粗糙度, terrain, dem]
groups: [group:raster]

layer_requirements:
  input_ref: raster

geometry_requirements: {}
field_requirements: {}

rules:
  semantic: [required_slots]
  preflight: [raster_inputs]
  runtime_repair: []

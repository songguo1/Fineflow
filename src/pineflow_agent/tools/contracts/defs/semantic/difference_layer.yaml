name: difference_layer
description: "Subtract overlay layer features from the input vector layer."
category: qgis_semantic
terminal: false

algorithm_id: native:difference
required_slots: [input_ref, overlay_ref]
defaults:
  output: TEMPORARY_OUTPUT

processing_parameters:
  INPUT: input_ref
  OVERLAY: overlay_ref
  OUTPUT:
    value: __output__

output_policy:
  suffix: difference

display:
  title: "Difference layer"
  command: "difference {input_ref} minus {overlay_ref}"

tags: [差集, difference]
groups: [group:vector_overlay]

layer_requirements:
  input_ref: vector
  overlay_ref: vector

slot_roles:
  primary_input: input_ref
  overlay_inputs: [overlay_ref]
  invalid_geometry_default: overlay_ref
  repair_targets: [input_ref, overlay_ref]

geometry_requirements: {}
field_requirements: {}

rules:
  semantic: [required_layers]
  preflight: [layer_exists, geometry_risk]
  runtime_repair: [invalid_geometry]

name: clip_layer
description: "Clip one vector layer by another vector layer."
category: qgis_semantic
terminal: false

algorithm_id: native:clip
required_slots: [input_ref, overlay_ref]
defaults:
  output: TEMPORARY_OUTPUT

processing_parameters:
  INPUT: input_ref
  OVERLAY: overlay_ref
  OUTPUT:
    value: __output__

output_policy:
  suffix: clip

display:
  title: "Clip layer"
  command: "clip {input_ref} by {overlay_ref}"

tags: [裁切, 裁剪, clip, 边界]
groups: [group:vector_overlay]

layer_requirements:
  input_ref: vector
  overlay_ref: vector

slot_roles:
  primary_input: input_ref
  overlay_inputs: [overlay_ref]
  invalid_geometry_default: overlay_ref
  repair_targets: [input_ref, overlay_ref]

geometry_requirements:
  overlay_ref: polygon

field_requirements: {}

rules:
  semantic: [required_layers]
  preflight: [layer_exists, geometry_risk]
  runtime_repair: [invalid_geometry]
